<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MP Eagle Wood Craft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: #fff;
      text-align: center;
    }

    h1 {
      padding: 20px;
      background: black;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1c1c1c;
      margin: 15px;
      padding: 15px;
      width: 250px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px;
      background: gold;
      color: black;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>MP Eagle Wood Craft 🦅</h1>

<div class="products" id="products"></div>

<script>
fetch("https://your-app.onrender.com/products")
.then(res => res.json())
.then(data => {
  const container = document.getElementById("products");

  data.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}" />
        <h2>${p.name}</h2>
        <p>₹${p.price}</p>
        <a href="https://instagram.com/mpeaglewoodcraft" target="_blank">
          Order on Instagram
        </a>
      </div>
    `;
  });
});
</script>

</body>
</html>
