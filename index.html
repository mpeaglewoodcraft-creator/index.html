<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MP Eagle Wood Craft | Handcrafted Wooden Masterpieces</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --wood-dark: #1A0E07;
  --wood-mid: #3D1F0A;
  --wood-warm: #6B3A1F;
  --wood-light: #A0522D;
  --wood-pale: #C8956C;
  --cream: #F7EDD8;
  --cream2: #EFE0C0;
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --gold-dim: #8A6F30;
  --white: #FFFDF5;
  --text-dark: #1A0E07;
  --text-mid: #4A2F1A;
  --text-light: #7A5535;
  --shadow-warm: rgba(44,24,16,0.35);
  --bg: #F7EDD8;
  --card-bg: #FFFDF5;
  --surface: #EFE0C0;
  --text-primary: #1A0E07;
  --text-secondary: #4A2F1A;
  --border: rgba(139,69,19,0.2);
  --nav-bg: rgba(26,14,7,0.97);
  --hero-bg: linear-gradient(160deg, #1A0E07 0%, #3D1F0A 50%, #1A0E07 100%);
  --green: #2A6B2A;
  --red: #C0392B;
}
[data-theme="light"] {
  --bg: #FFFDF5;
  --card-bg: #FFFFFF;
  --surface: #F7EDD8;
  --text-primary: #1A0E07;
  --text-secondary: #4A2F1A;
  --border: rgba(139,69,19,0.15);
  --nav-bg: rgba(26,14,7,0.98);
  --hero-bg: linear-gradient(160deg, #1A0E07 0%, #3D1F0A 50%, #1A0E07 100%);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Cormorant Garamond',serif;
  background:var(--bg);
  color:var(--text-primary);
  overflow-x:hidden;
  transition:background 0.4s,color 0.4s;
}

/* CURSOR */
.cursor{width:10px;height:10px;background:var(--gold);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:99999;transition:transform 0.08s;mix-blend-mode:difference;}
.cursor-ring{width:32px;height:32px;border:1.5px solid var(--gold);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:99998;transition:transform 0.15s,width 0.2s,height 0.2s,opacity 0.2s;}
.cursor-ring.expand{width:50px;height:50px;opacity:0.5;}
@media(pointer:coarse){.cursor,.cursor-ring{display:none;}}

/* SCROLL BAR */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--wood-dark);}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px;}

/* PROGRESS */
#scroll-bar{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--wood-light),var(--gold));z-index:10001;width:0%;transition:width 0.1s linear;box-shadow:0 0 6px var(--gold);}

/* ============ ADMIN PANEL ============ */
#admin-panel{
  position:fixed;inset:0;z-index:99997;
  background:radial-gradient(ellipse at center, #2C1200 0%, #0D0600 100%);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  transition:opacity 0.9s ease, visibility 0.9s ease, transform 0.9s ease;
}
#admin-panel.exit{opacity:0;visibility:hidden;transform:scale(1.05);}
.admin-particles{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.particle{position:absolute;width:2px;height:2px;background:var(--gold);border-radius:50%;animation:particleDrift linear infinite;opacity:0;}
@keyframes particleDrift{
  0%{transform:translateY(100vh) translateX(0);opacity:0;}
  10%{opacity:0.8;}
  90%{opacity:0.3;}
  100%{transform:translateY(-100px) translateX(var(--drift));opacity:0;}
}
.admin-inner{
  text-align:center;position:relative;z-index:2;
  animation:adminIn 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes adminIn{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
.admin-logo-wrap{
  position:relative;display:inline-block;margin-bottom:2rem;
}
.admin-logo-glow{
  position:absolute;inset:-20px;
  background:radial-gradient(circle,rgba(201,168,76,0.25) 0%,transparent 70%);
  animation:glowPulse 3s ease-in-out infinite;
  border-radius:50%;
}
@keyframes glowPulse{0%,100%{transform:scale(1);opacity:0.7;}50%{transform:scale(1.2);opacity:1;}}
.admin-logo-icon{
  font-size:5rem;
  display:block;
  filter:drop-shadow(0 0 20px rgba(201,168,76,0.6));
  animation:iconFloat 4s ease-in-out infinite;
}
@keyframes iconFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.admin-brand{
  font-family:'Playfair Display',serif;
  font-size:clamp(2rem,5vw,3.5rem);
  font-weight:900;
  color:var(--white);
  letter-spacing:2px;
  margin-bottom:0.4rem;
  text-shadow:0 0 40px rgba(201,168,76,0.3);
}
.admin-brand span{color:var(--gold);}
.admin-tagline{
  font-family:'Josefin Sans',sans-serif;
  font-size:0.75rem;letter-spacing:6px;
  color:rgba(201,168,76,0.6);
  text-transform:uppercase;
  margin-bottom:3rem;
}
.admin-divider{
  width:80px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:0 auto 3rem;
}
.admin-enter-btn{
  position:relative;
  background:transparent;
  border:1px solid var(--gold);
  color:var(--gold);
  font-family:'Josefin Sans',sans-serif;
  font-size:0.8rem;font-weight:600;
  letter-spacing:4px;text-transform:uppercase;
  padding:1.1rem 3rem;
  cursor:pointer;
  border-radius:2px;
  overflow:hidden;
  transition:all 0.4s ease;
}
.admin-enter-btn::before{
  content:'';position:absolute;inset:0;
  background:var(--gold);
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
  z-index:0;
}
.admin-enter-btn:hover::before{transform:scaleX(1);}
.admin-enter-btn:hover{color:var(--wood-dark);}
.admin-enter-btn span{position:relative;z-index:1;}
.admin-credits{
  position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);
  font-family:'Josefin Sans',sans-serif;
  font-size:0.62rem;letter-spacing:3px;
  color:rgba(255,255,255,0.2);text-transform:uppercase;
}
.admin-rings{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;
}
.admin-ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(201,168,76,0.08);
  animation:ringExpand linear infinite;
}
.admin-ring:nth-child(1){width:300px;height:300px;animation-duration:6s;}
.admin-ring:nth-child(2){width:500px;height:500px;animation-duration:9s;animation-delay:2s;}
.admin-ring:nth-child(3){width:700px;height:700px;animation-duration:12s;animation-delay:4s;}
.admin-ring:nth-child(4){width:900px;height:900px;animation-duration:15s;animation-delay:6s;}
@keyframes ringExpand{0%{opacity:0;transform:scale(0.8);}50%{opacity:1;}100%{opacity:0;transform:scale(1.1);}}

/* ============ NAVBAR ============ */
#navbar{
  position:fixed;top:0;left:0;right:0;z-index:9000;
  padding:0 2.5rem;height:72px;
  display:flex;align-items:center;justify-content:space-between;
  background:transparent;
  transition:all 0.4s ease;
}
#navbar.scrolled{
  background:var(--nav-bg);
  backdrop-filter:blur(20px);
  box-shadow:0 4px 30px rgba(0,0,0,0.5);
  height:62px;
}
.nav-logo{display:flex;align-items:center;gap:0.6rem;text-decoration:none;cursor:pointer;}
.nav-logo-icon{font-size:1.9rem;transition:transform 0.3s;display:flex;align-items:center;}
.nav-logo:hover .nav-logo-icon{transform:rotate(-8deg) scale(1.1);}
.nav-logo-text{font-family:'Playfair Display',serif;color:var(--white);font-size:1.15rem;font-weight:700;line-height:1.1;text-shadow:0 2px 8px rgba(0,0,0,0.5);}
.nav-logo-sub{font-family:'Josefin Sans',sans-serif;font-size:0.5rem;letter-spacing:4px;color:var(--gold-light);text-transform:uppercase;}
.nav-right{display:flex;align-items:center;gap:1.2rem;}
.nav-links{display:flex;align-items:center;gap:2rem;list-style:none;}
.nav-links a{font-family:'Josefin Sans',sans-serif;color:var(--white);text-decoration:none;font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;position:relative;padding-bottom:3px;transition:color 0.3s;cursor:pointer;}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--gold);transition:width 0.3s;}
.nav-links a:hover::after{width:100%;}
.nav-links a:hover{color:var(--gold-light);}
.nav-icon-btn{background:none;border:none;color:var(--white);font-size:1.3rem;cursor:pointer;padding:0.4rem;display:flex;align-items:center;justify-content:center;transition:all 0.3s;position:relative;border-radius:4px;}
.nav-icon-btn:hover{color:var(--gold);transform:scale(1.1);}
.cart-badge{position:absolute;top:-4px;right:-4px;background:var(--gold);color:var(--wood-dark);width:16px;height:16px;border-radius:50%;font-size:0.6rem;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Josefin Sans',sans-serif;}
.hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:6px;background:none;border:none;}
.hamburger span{width:22px;height:1.5px;background:var(--white);border-radius:2px;transition:all 0.35s cubic-bezier(0.16,1,0.3,1);display:block;}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(4px,4px);}
.hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px);}

/* MOBILE MENU */
#mobile-menu{
  position:fixed;top:0;right:0;height:100vh;width:min(320px,85vw);
  background:var(--wood-dark);
  z-index:8999;
  transform:translateX(100%);
  transition:transform 0.45s cubic-bezier(0.16,1,0.3,1);
  display:flex;flex-direction:column;padding:6rem 2rem 2rem;
  border-left:1px solid rgba(201,168,76,0.15);
}
#mobile-menu.open{transform:translateX(0);}
#menu-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:8998;opacity:0;pointer-events:none;transition:opacity 0.3s;backdrop-filter:blur(4px);}
#menu-backdrop.show{opacity:1;pointer-events:all;}
.mobile-nav-link{display:block;font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--white);text-decoration:none;padding:0.8rem 0;border-bottom:1px solid rgba(255,255,255,0.07);transition:color 0.3s,padding 0.3s;cursor:pointer;}
.mobile-nav-link:hover{color:var(--gold);padding-left:8px;}
.mobile-menu-footer{margin-top:auto;padding-top:2rem;border-top:1px solid rgba(201,168,76,0.2);}
.mobile-insta-btn{display:flex;align-items:center;gap:0.6rem;background:linear-gradient(135deg,#833ab4,#fd1d1d,#f56040);color:white;border:none;padding:0.8rem 1.5rem;border-radius:6px;font-family:'Josefin Sans',sans-serif;font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;width:100%;justify-content:center;margin-bottom:1rem;}

/* ============ HERO ============ */
#hero{
  min-height:100vh;
  background:var(--hero-bg);
  position:relative;overflow:hidden;
  display:flex;align-items:center;
}
.hero-canvas{position:absolute;inset:0;overflow:hidden;}
.wood-grain{
  position:absolute;
  background:repeating-linear-gradient(
    87deg,
    transparent,transparent 2px,
    rgba(201,168,76,0.025) 2px,rgba(201,168,76,0.025) 3px
  );
  inset:0;
}
.hero-accent-circle{
  position:absolute;right:-200px;top:50%;transform:translateY(-50%);
  width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,168,76,0.08) 0%,transparent 70%);
  animation:slowPulse 8s ease-in-out infinite;
}
@keyframes slowPulse{0%,100%{transform:translateY(-50%) scale(1);}50%{transform:translateY(-50%) scale(1.1);}}
.hero-content{
  position:relative;z-index:2;
  padding:0 4rem 0 5rem;
  max-width:720px;
}
.hero-tag{
  display:inline-flex;align-items:center;gap:0.6rem;
  font-family:'Josefin Sans',sans-serif;font-size:0.65rem;letter-spacing:5px;
  color:var(--gold);text-transform:uppercase;
  border:1px solid rgba(201,168,76,0.35);padding:0.4rem 1rem;margin-bottom:2rem;
  border-radius:2px;
  opacity:0;animation:fadeUp 0.9s ease 0.6s forwards;
}
.hero-tag-dot{width:5px;height:5px;background:var(--gold);border-radius:50%;animation:dotBlink 2s ease infinite;}
@keyframes dotBlink{0%,100%{opacity:1;}50%{opacity:0.2;};}
.hero-h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(3rem,6.5vw,6rem);
  color:var(--white);line-height:1.02;font-weight:900;
  margin-bottom:1.5rem;
  opacity:0;animation:fadeUp 0.9s ease 0.9s forwards;
}
.hero-h1 em{font-style:italic;font-weight:400;color:var(--wood-pale);}
.hero-h1 strong{color:var(--gold);}
.hero-sub{
  font-size:1.2rem;color:rgba(247,237,216,0.7);line-height:1.85;
  max-width:480px;margin-bottom:2.5rem;
  opacity:0;animation:fadeUp 0.9s ease 1.2s forwards;
}
.hero-cta{
  display:flex;gap:1rem;flex-wrap:wrap;
  opacity:0;animation:fadeUp 0.9s ease 1.5s forwards;
}
.btn-gold{
  display:inline-flex;align-items:center;gap:0.5rem;
  background:var(--gold);color:var(--wood-dark);
  font-family:'Josefin Sans',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:1rem 2.2rem;border:none;border-radius:2px;cursor:pointer;
  position:relative;overflow:hidden;transition:all 0.35s;text-decoration:none;
}
.btn-gold::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.2);transform:translateX(-100%) skewX(-15deg);transition:transform 0.4s;}
.btn-gold:hover::after{transform:translateX(110%) skewX(-15deg);}
.btn-gold:hover{background:var(--gold-light);box-shadow:0 8px 30px rgba(201,168,76,0.4);transform:translateY(-2px);}
.btn-outline{
  display:inline-flex;align-items:center;gap:0.5rem;
  background:transparent;color:var(--white);
  font-family:'Josefin Sans',sans-serif;font-size:0.75rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  padding:1rem 2.2rem;border:1px solid rgba(247,237,216,0.35);border-radius:2px;cursor:pointer;
  transition:all 0.35s;text-decoration:none;
}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);box-shadow:0 0 20px rgba(201,168,76,0.15);}
.hero-right{
  position:absolute;right:5%;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:2rem;text-align:right;
  opacity:0;animation:fadeUp 0.9s ease 1.8s forwards;
}
.hero-stat-num{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:900;color:var(--gold);line-height:1;}
.hero-stat-txt{font-family:'Josefin Sans',sans-serif;font-size:0.6rem;letter-spacing:3px;color:rgba(247,237,216,0.4);text-transform:uppercase;}
.hero-scroll-cue{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:0.5rem;animation:bounce 2.5s ease infinite;}
.hero-scroll-cue span{font-family:'Josefin Sans',sans-serif;font-size:0.58rem;letter-spacing:3px;color:rgba(247,237,216,0.3);text-transform:uppercase;}
.hero-scroll-line{width:1px;height:45px;background:linear-gradient(to bottom,rgba(201,168,76,0.5),transparent);}
@keyframes fadeUp{from{opacity:0;transform:translateY(25px);}to{opacity:1;transform:translateY(0);}}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(8px);}}

/* TRUST BAR */
.trust-bar{
  background:var(--wood-dark);
  border-top:1px solid rgba(201,168,76,0.15);
  border-bottom:1px solid rgba(201,168,76,0.15);
  padding:1rem 3rem;overflow:hidden;
}
.trust-ticker{display:flex;gap:5rem;animation:ticker 25s linear infinite;white-space:nowrap;width:max-content;}
.trust-item{display:flex;align-items:center;gap:0.6rem;font-family:'Josefin Sans',sans-serif;font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:rgba(201,168,76,0.7);}
.trust-item span{font-size:1.1rem;}
@keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-50%);};}

/* ============ SECTIONS ============ */
.section{padding:6rem 3rem;}
.section-inner{max-width:1280px;margin:0 auto;}
.sec-label{font-family:'Josefin Sans',sans-serif;font-size:0.65rem;letter-spacing:5px;color:var(--wood-light);text-transform:uppercase;display:block;margin-bottom:0.8rem;}
.sec-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);font-weight:900;color:var(--text-primary);line-height:1.15;margin-bottom:0.8rem;}
.sec-title span{color:var(--wood-warm);}
.sec-line{width:50px;height:2px;background:linear-gradient(90deg,var(--wood-warm),var(--gold));border-radius:2px;margin:0 auto;margin-top:1rem;}
.sec-line.left{margin:1rem 0 0;}
.sec-desc{font-size:1.1rem;color:var(--text-secondary);line-height:1.8;max-width:580px;margin:1.5rem auto 0;}
.text-center{text-align:center;}

/* PRODUCTS */
#products{background:var(--bg);}
.filter-row{display:flex;justify-content:center;gap:0.6rem;flex-wrap:wrap;margin-bottom:3rem;}
.filter-btn{
  font-family:'Josefin Sans',sans-serif;font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;
  padding:0.55rem 1.3rem;border:1px solid var(--border);background:transparent;color:var(--text-secondary);
  border-radius:2px;cursor:pointer;transition:all 0.3s;
}
.filter-btn:hover,.filter-btn.active{background:var(--wood-warm);color:white;border-color:var(--wood-warm);box-shadow:0 4px 15px rgba(107,58,31,0.3);}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:1.8rem;}

/* PRODUCT CARD */
.product-card{
  background:var(--card-bg);border-radius:6px;overflow:hidden;
  box-shadow:0 3px 20px var(--shadow-warm);
  transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
  position:relative;cursor:pointer;
}
.product-card:hover{transform:translateY(-10px);box-shadow:0 20px 50px rgba(44,24,16,0.3);}
.product-img-wrap{
  height:230px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--wood-mid),var(--wood-dark));
  display:flex;align-items:center;justify-content:center;
}
.product-illo{font-size:5.5rem;transition:transform 0.5s cubic-bezier(0.16,1,0.3,1);filter:drop-shadow(0 8px 20px rgba(0,0,0,0.4));}
.product-card:hover .product-illo{transform:scale(1.15) rotate(-5deg);}
.p-badge{position:absolute;top:0.9rem;left:0.9rem;font-family:'Josefin Sans',sans-serif;font-size:0.58rem;letter-spacing:2px;text-transform:uppercase;padding:0.25rem 0.7rem;border-radius:2px;}
.b-hot{background:var(--red);color:white;}
.b-new{background:var(--gold);color:var(--wood-dark);}
.b-pop{background:var(--wood-warm);color:white;}
.p-wish{
  position:absolute;top:0.9rem;right:0.9rem;
  width:34px;height:34px;border-radius:50%;
  background:rgba(247,237,216,0.9);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:0.95rem;
  transition:all 0.3s;backdrop-filter:blur(4px);
}
.p-wish:hover,.p-wish.active{background:var(--wood-warm);color:white;}
.p-stock{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
  padding:1rem 1rem 0.6rem;
  font-family:'Josefin Sans',sans-serif;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold-light);
}
.p-body{padding:1.4rem;}
.p-cat{font-family:'Josefin Sans',sans-serif;font-size:0.6rem;letter-spacing:3px;color:var(--wood-light);text-transform:uppercase;margin-bottom:0.3rem;}
.p-name{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:var(--text-primary);margin-bottom:0.4rem;line-height:1.25;}
.p-short{font-size:0.88rem;color:var(--text-light);line-height:1.55;margin-bottom:0.8rem;}
.p-stars{color:var(--gold);font-size:0.8rem;margin-bottom:0.9rem;}
.p-stars span{color:var(--text-light);font-size:0.75rem;margin-left:0.3rem;}
.p-foot{display:flex;align-items:center;justify-content:space-between;}
.p-price{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;color:var(--wood-warm);}
.p-price s{font-size:0.85rem;color:var(--text-light);font-weight:400;margin-left:0.4rem;font-family:'Josefin Sans',sans-serif;}
